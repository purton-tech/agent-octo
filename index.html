<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minimal Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen bg-white">

<chat-ui class="block h-full"></chat-ui>

<script>
class ChatUI extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: "open" });

    this.shadowRoot.innerHTML = `
      <style>
        :host {
          display: block;
          height: 100%;
          color: #111827;
          font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
          box-sizing: border-box;
        }

        .container {
          height: 100%;
          display: flex;
          flex-direction: column;
          background: #ffffff;
        }

        .messages {
          flex: 1;
          overflow-y: auto;
          padding: 24px 16px;
        }

        .messages-inner {
          width: 100%;
          max-width: 48rem;
          margin: 0 auto;
          display: flex;
          flex-direction: column;
          gap: 20px;
          padding-bottom: 140vh;
        }

        .row {
          display: flex;
          width: 100%;
        }

        .row.user {
          justify-content: flex-end;
        }

        .row.assistant {
          justify-content: flex-start;
        }

        .row.user.entering {
          animation: user-slide-in 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .bubble {
          max-width: min(85%, 42rem);
          border-radius: 20px;
          padding: 14px 16px;
          line-height: 1.5;
          font-size: 0.95rem;
          overflow-wrap: anywhere;
        }

        .row.user .bubble {
          background: #ffffff;
          border: 1px solid #d1d5db;
          box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .row.assistant .bubble {
          background: transparent;
          border: 0;
          padding-left: 0;
          padding-right: 0;
        }

        .input-shell {
          border-top: 1px solid #e5e7eb;
          padding: 16px;
          background: #ffffff;
        }

        .debug {
          width: 100%;
          max-width: 48rem;
          margin: 8px auto 0;
          color: #6b7280;
          font-size: 12px;
          font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        .input {
          width: 100%;
          max-width: 48rem;
          margin: 0 auto;
          display: flex;
          align-items: flex-end;
          gap: 12px;
          border: 1px solid #d1d5db;
          border-radius: 24px;
          padding: 10px 12px;
          box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        textarea {
          flex: 1;
          resize: none;
          border: 0;
          outline: none;
          background: transparent;
          min-height: 24px;
          max-height: 160px;
          font: inherit;
          line-height: 1.5;
          color: #111827;
        }

        button {
          border: 0;
          border-radius: 999px;
          background: #111827;
          color: #ffffff;
          padding: 10px 14px;
          font: inherit;
          font-weight: 600;
          cursor: pointer;
        }

        button:hover {
          background: #1f2937;
        }

        pre {
          background: #f3f4f6;
          padding: 12px;
          overflow-x: auto;
          border-radius: 12px;
        }

        code {
          background: #f3f4f6;
          padding: 2px 6px;
          border-radius: 6px;
        }

        p {
          margin: 0 0 12px;
        }

        p:last-child {
          margin-bottom: 0;
        }

        @keyframes user-slide-in {
          from {
            opacity: 0;
            transform: translateY(18px);
          }

          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      </style>

      <div class="container">
        <div class="messages" id="messages">
          <div class="messages-inner" id="messages-inner">
            <div id="anchor"></div>
          </div>
        </div>

        <div class="input-shell">
          <div class="input">
            <textarea rows="1" placeholder="Message..."></textarea>
            <button>Send</button>
          </div>
          <div class="debug" id="debug"></div>
        </div>
      </div>
    `;

    this.messagesEl = this.shadowRoot.getElementById("messages");
    this.messagesInnerEl = this.shadowRoot.getElementById("messages-inner");
    this.anchor = this.shadowRoot.getElementById("anchor");
    this.textarea = this.shadowRoot.querySelector("textarea");
    this.button = this.shadowRoot.querySelector("button");
    this.debugEl = this.shadowRoot.getElementById("debug");

    this.isAtBottom = true;

    this.messagesEl.addEventListener("scroll", () => this.handleScroll());
    this.button.addEventListener("click", () => this.send());
    this.textarea.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        this.send();
      }
    });
  }

  handleScroll() {
    const el = this.messagesEl;
    const distance = el.scrollHeight - (el.scrollTop + el.clientHeight);
    this.isAtBottom = distance < 40;
  }

  scrollIfNeeded() {
    if (this.isAtBottom) {
      this.anchor.scrollIntoView({ block: "end" });
    }
  }

  scrollRowNearTop(row, topOffset = 8) {
    const rowTop = row.offsetTop;
    const targetTop = Math.max(0, rowTop - topOffset);
    this.messagesEl.scrollTop = targetTop;
    this.debugEl.textContent = `rowTop=${rowTop} targetTop=${targetTop} scrollTop=${this.messagesEl.scrollTop}`;
  }

  addMessage(role, content = "", options = {}) {
    const row = document.createElement("div");
    row.className = `row ${role}`;
    if (options.entering) {
      row.classList.add("entering");
      row.addEventListener("animationend", () => {
        row.classList.remove("entering");
      }, { once: true });
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const span = document.createElement("span");
    bubble.appendChild(span);
    row.appendChild(bubble);
    this.messagesInnerEl.insertBefore(row, this.anchor);
    if (options.pinNearTop) {
      requestAnimationFrame(() => this.scrollRowNearTop(row, 8));
    } else if (options.skipScroll) {
      // Intentionally do nothing.
    } else {
      this.scrollIfNeeded();
    }
    return { row, contentEl: span };
  }

  renderMarkdown(text) {
    text = text.replace(/```([\s\S]*?)```/g, (_, code) => {
      return `<pre><code>${this.escape(code)}</code></pre>`;
    });

    text = text.replace(/`([^`]+)`/g, (_, code) => {
      return `<code>${this.escape(code)}</code>`;
    });

    return text.split("\n\n").map(p => `<p>${p}</p>`).join("");
  }

  escape(str) {
    return str.replace(/[&<>]/g, c => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;"
    }[c]));
  }

  async send() {
    const text = this.textarea.value.trim();
    if (!text) return;

    this.textarea.value = "";

    const userMessage = this.addMessage("user", text, {
      entering: true,
      pinNearTop: true
    });
    userMessage.contentEl.innerText = text;

    const assistantMessage = this.addMessage("assistant", "", {
      skipScroll: true
    });
    const el = assistantMessage.contentEl;
    requestAnimationFrame(() => this.scrollRowNearTop(userMessage.row, 8));
    const response = this.generateResponse(text);
    let acc = "";

    for (const ch of response) {
      acc += ch;
      el.innerHTML = this.renderMarkdown(acc);
      await this.sleep(15 + Math.random() * 30);
    }
  }

  generateResponse(input) {
    const random = [
      "That makes sense.",
      "You could approach it incrementally.",
      "I would start with a minimal version.",
      "Interesting — here's an example:\n\n```js\nconsole.log('hello world')\n```",
      "Yes, and you can extend it later.",
      "You said: `" + input + "` — that's a good starting point."
    ];
    return random[Math.floor(Math.random() * random.length)] +
      "\n\nLorem ipsum dolor sit amet, consectetur adipiscing elit. ".repeat(3);
  }

  sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }
}

customElements.define("chat-ui", ChatUI);
</script>

</body>
</html>
