<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hey Airbus Wireframe</title>
    <link href="./dist/tailwind.css" rel="stylesheet" type="text/css">
  </head>
  <body class="min-h-screen bg-base-200">
    <div class="app-shell">
      <aside class="app-sidebar">
        <div class="app-sidebar-inner">
          <div class="border-base-300 border-b px-6 py-5">
            <div class="flex items-center gap-3">
              <div class="bg-primary text-primary-content flex h-10 w-10 items-center justify-center rounded-box">
                HA
              </div>
              <div>
                <p class="text-sm font-semibold">Hey Airbus</p>
              </div>
            </div>
          </div>

          <div class="app-sidebar-nav">
            <ul class="menu w-full gap-1 p-0" id="menu">
              <li><a class="wireframe-link" href="?page=integrations" data-page="integrations">Integrations</a></li>
              <li><a class="wireframe-link" href="?page=spaces" data-page="spaces">Spaces</a></li>
              <li><a class="wireframe-link" href="?page=databases" data-page="databases">Databases</a></li>
              <li><a class="wireframe-link" href="?page=scheduled-tasks" data-page="scheduled-tasks">Scheduled Tasks</a></li>
              <li><a class="wireframe-link" href="?page=team" data-page="team">Team</a></li>
              <li><a class="wireframe-link" href="?page=knowledge" data-page="knowledge">Knowledge</a></li>
              <li><a class="wireframe-link" href="?page=memory" data-page="memory">Memory</a></li>
              <li><a class="wireframe-link" href="?page=usage" data-page="usage">Usage</a></li>
              <li><a class="wireframe-link" href="?page=settings" data-page="settings">Settings</a></li>
            </ul>
          </div>

          <div class="border-base-300 space-y-4 border-t px-6 py-5 text-sm">
            <a class="link block" href="#">Support</a>
            <a class="link block" href="#">Invite teammates</a>
            <div class="pt-4">
              <p class="font-medium">Ian</p>
              <p class="text-base-content/70 text-xs">ian.purton@gmail.com</p>
            </div>
          </div>
        </div>
      </aside>

      <main class="app-main">
        <header class="border-base-300 bg-base-100 border-b px-6 py-5">
          <div class="flex min-h-10 flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
              <h1 id="page-title" class="text-2xl font-semibold">Integrations</h1>
            </div>
            <div id="page-actions" class="flex min-h-10 items-center gap-3"></div>
          </div>
        </header>

        <section class="section-padding">
          <div id="router-error" class="alert alert-error mb-4 hidden"></div>
          <div id="page-content" class="page-stack"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
