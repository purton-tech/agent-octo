<div class="page-stack">
  <div>
    <h2 class="text-2xl font-semibold">Settings</h2>
    <p class="text-base-content/70 mt-1 text-sm">
      Configure how Hey Airbus behaves across Airbus teams, tools, and assistant workflows.
    </p>
  </div>

  <div class="grid gap-6 lg:grid-cols-2">
    <section class="card">
      <div class="card-body">
        <h3 class="card-title">Assistant behavior</h3>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Default tone</legend>
          <select class="select select-bordered w-full">
            <option selected>Professional and concise</option>
            <option>Detailed and collaborative</option>
            <option>Strict reviewer mode</option>
          </select>
        </fieldset>
        <label class="label justify-start gap-3">
          <input type="checkbox" checked class="toggle">
          <span>Use Airbus terminology in generated responses</span>
        </label>
        <label class="label justify-start gap-3">
          <input type="checkbox" checked class="toggle">
          <span>Suggest follow-up actions automatically</span>
        </label>
      </div>
    </section>

    <section class="card">
      <div class="card-body">
        <h3 class="card-title">Workspace context</h3>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Primary knowledge sources</legend>
          <input class="input input-bordered w-full" value="Confluence, Jira, Slack, SharePoint">
        </fieldset>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Default team scope</legend>
          <input class="input input-bordered w-full" value="Airbus Digital Workplace">
        </fieldset>
      </div>
    </section>

    <section class="card lg:col-span-2">
      <div class="card-body">
        <h3 class="card-title">Agent controls</h3>
        <div class="grid gap-4 md:grid-cols-3">
          <div class="stat rounded-box">
            <div class="stat-title">Active MCP tools</div>
            <div class="stat-value text-2xl">14</div>
          </div>
          <div class="stat rounded-box">
            <div class="stat-title">Scheduled automations</div>
            <div class="stat-value text-2xl">3</div>
          </div>
          <div class="stat rounded-box">
            <div class="stat-title">Shared spaces</div>
            <div class="stat-value text-2xl">2</div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
