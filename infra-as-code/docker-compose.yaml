services:
  db:
    image: postgres:18
    restart: unless-stopped
    entrypoint:
      - /bin/bash
      - -c
      - |
        cat >/docker-entrypoint-initdb.d/00-demo-roles.sql <<'SQL'
        CREATE ROLE "db-owner" LOGIN PASSWORD '2623167177252';
        CREATE ROLE application_user LOGIN PASSWORD '2231312050241';
        CREATE ROLE application_readonly LOGIN PASSWORD '915166195229';
        CREATE ROLE authenticator LOGIN PASSWORD '78250191100178';

        GRANT ALL PRIVILEGES ON DATABASE octo TO "db-owner";
        GRANT CONNECT ON DATABASE octo TO application_user;
        GRANT CONNECT ON DATABASE octo TO application_readonly;
        GRANT CONNECT ON DATABASE octo TO authenticator;

        ALTER DATABASE octo OWNER TO "db-owner";
        SQL
        exec docker-entrypoint.sh postgres
    environment:
      POSTGRES_DB: octo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d octo"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - octo-postgres-data:/var/lib/postgresql

  migrations:
    image: ghcr.io/purton-tech/octo-migrations:1.0.2
    restart: "no"
    environment:
      DATABASE_URL: postgres://db-owner:2623167177252@db:5432/octo?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  octo:
    image: ghcr.io/purton-tech/octo:1.0.2
    restart: unless-stopped
    environment:
      DANGER_JWT_OVERRIDE: eyJ0eXAiOiJKV1QiLCJhbGciOiJFUzI1NiIsImtpZCI6ImE0NTEyODgxYjBhZDYyM2FkNTMwOGQ1YzI1ZWQ5Yjg1In0.eyJzdWIiOiIxMjM0NTY3ODkwIiwiaXNzIjoiaHR0cHM6Ly9leGFtcGxlLmNvbSIsIm5hbWUiOiJKb2huIERvZSIsImlhdCI6MTUxNjIzOTAyMiwiZW1haWwiOiJqb2huQGFjbWUub3JnIn0.q_y5Hkt8MKQzauN7gZFrA7126N1k0NrdS4VzsYeKN4uy5iLr3Sy_Ws5jT2d921flI7CKdwg39tq-7UVGaKUTVQ
      APPLICATION_URL: postgres://application_user:2231312050241@db:5432/octo?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  agent-runtime:
    image: ghcr.io/purton-tech/agent-runtime:1.0.2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://db-owner:2623167177252@db:5432/octo?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  telegram-egress:
    image: ghcr.io/purton-tech/telegram-egress:1.0.2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://db-owner:2623167177252@db:5432/octo?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  telegram-ingress-polling:
    image: ghcr.io/purton-tech/telegram-ingress-polling:1.0.2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://db-owner:2623167177252@db:5432/octo?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

volumes:
  octo-postgres-data:
