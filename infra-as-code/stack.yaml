apiVersion: stack-cli.dev/v1
kind: StackApp
metadata:
  name: octo
  namespace: agent-octo
spec:
  components:
    db: {}
    realtime: {}
    storage:
      install_minio: true
      max_upload_size: 50mb
  profiles:
    dev:
      components:
        ingress:
          port: 30060
        db:
          expose_db_port: 30061
  services:
    web:
      image: ghcr.io/purton-tech/octo:1.0.0
      port: 8080
      database_url: DATABASE_URL
      init:
        - image: ghcr.io/purton-tech/octo-migrations:1.0.0
          database_url: DATABASE_URL
    channels:
      image: ghcr.io/purton-tech/channels:1.0.0
      database_url: DATABASE_URL
    agent-runtime:
      image: ghcr.io/purton-tech/agent-runtime:1.0.0
      database_url: DATABASE_URL
