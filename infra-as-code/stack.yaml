apiVersion: stack-cli.dev/v1
kind: StackApp
metadata:
  name: octo
  namespace: agent-octo
spec:
  components:
    db: {}
    realtime: {}
    storage:
      install_minio: true
      max_upload_size: 50mb
  profiles:
    dev:
      components:
        ingress:
          port: 30060
        db:
          expose_db_port: 30061
      services:
        web:
          image: ghcr.io/purton-tech/octo:1.0.1-rc.15
          port: 8080
    prod:
      services:
        web:
          image: ghcr.io/purton-tech/octo:1.0.1-rc.15
          port: 8080
          database_url: APPLICATION_URL
          init:
            image: ghcr.io/purton-tech/octo-migrations:1.0.1-rc.15
            migrations_database_url: DATABASE_URL
        channels:
          image: ghcr.io/purton-tech/channels:1.0.1-rc.15
          database_url: APPLICATION_URL
          service_role_jwt: SERVICE_ROLE_JWT
        agent-runtime:
          image: ghcr.io/purton-tech/agent-runtime:1.0.1-rc.15
          database_url: APPLICATION_URL
          service_role_jwt: SERVICE_ROLE_JWT
